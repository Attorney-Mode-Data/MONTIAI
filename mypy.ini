[mypy]
# Python version
python_version = 3.10

# Core settings – strict but practical
strict_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True

# Disallow incomplete or missing type annotations
disallow_untyped_defs = True
disallow_any_unimported = False   # allow missing stubs for some packages
disallow_untyped_calls = True
disallow_untyped_decorators = True

# Check that all functions have annotations, but allow some legacy
check_untyped_defs = True

# Ignore missing imports globally? No – we want to be explicit.
ignore_missing_imports = False

# Enable some additional checks
no_implicit_optional = True
strict_equality = True
warn_return_any = True

# Per‑module overrides

# The main package – enforce all types strictly
[mypy-aiomultiprocess.*]
ignore_missing_imports = False
disallow_untyped_defs = True

# Tests – relaxed to avoid verbosity in test code
[mypy-aiomultiprocess.tests.*]
disallow_untyped_defs = False
ignore_missing_imports = True
warn_unused_ignores = False

# Third-party modules without stubs – explicitly ignore (or install stubs)
[mypy-multiprocessing.*]
ignore_missing_imports = True

# If you use any other libraries that lack stubs, add them here:
# [mypy-other_module.*]
# ignore_missing_imports = True
